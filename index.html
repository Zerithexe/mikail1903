<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kara Kartal | Arşiv</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --siyah: #050505; --altin: #c5a059; --beyaz: #f0f0f0; }
        body { margin: 0; background: var(--siyah); color: var(--beyaz); font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 90%; max-width: 500px; }
        .active { display: flex; }
        
        /* Kart Stili */
        #kartim { width: 300px; height: 480px; background: linear-gradient(135deg, #1a1a1a, #000); border: 2px solid var(--altin); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px 0; }
        
        button { background: transparent; border: 1px solid var(--altin); color: var(--altin); padding: 12px 25px; cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: var(--altin); color: var(--siyah); }
        input { padding: 12px; background: #111; border: 1px solid #333; color: white; width: 200px; text-align: center; }
        img { width: 120px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <section id="s1" class="screen active">
        <img src="https://i.hizliresim.com/q1w2e3r.png" alt="Kartal">
        <h1>Kara Kartal Çağırıyor</h1>
        <p>Hoş geldin <strong>Mikail</strong>, bu arşive girmeye hazır mısın?</p>
        <button onclick="degistir('s1','s2')">Giriş Yap</button>
    </section>

    <section id="s2" class="screen">
        <img src="https://upload.wikimedia.org/wikipedia/tr/b/be/Besiktas_JK.png" alt="BJK">
        <input type="password" id="sifre" placeholder="Geçiş Kodunu Gir">
        <button onclick="kontrolEt()">Kapıyı Aç</button>
    </section>

    <section id="s3" class="screen" style="height: auto; padding: 40px 0;">
        <div id="kartim">
            <h2 style="color:var(--altin)">BJK TARAFTAR</h2>
            <div style="font-size: 50px; margin: 20px 0;">🦅</div>
            <p>Sahibi: <strong>Mikail</strong></p>
            <p>Üyelik Yılı: 1903</p>
            <hr style="width: 80%; border-color: var(--altin);">
            <p style="font-size: 12px;">RESMİ TARAFTAR KARTI</p>
        </div>
        <button onclick="indir()">KARTI İNDİR (PNG)</button>
        <p style="margin-top: 20px; font-size: 14px; color: #666;">Beşiktaşımız 1903'ten beri sonsuza...</p>
    </section>

    <script>
        function degistir(cikis, giris) {
            document.getElementById(cikis).classList.remove('active');
            document.getElementById(giris).classList.add('active');
        }
        function kontrolEt() {
            if(document.getElementById('sifre').value == '1903') degistir('s2', 's3');
            else alert('Yanlış kod, Çarşı seni tanımıyor!');
        }
        function indir() {
            html2canvas(document.querySelector("#kartim")).then(canvas => {
                let link = document.createElement('a');
                link.download = 'Mikail_Besiktas_Karti.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
