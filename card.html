<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Taraftar Kartı</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Taraftar Kartı Oluştur</h1>

<input type="text" id="name" placeholder="Adın">

<input type="file" id="photo">

<button onclick="createCard()">
Kart Oluştur
</button>

<div id="card">

<img src="bjklogo.png" class="card-logo">

<h2 id="cardName">MİKAİL</h2>

<p>Beşiktaş Taraftarı</p>

<p id="cardNo"></p>

<img id="preview">

</div>

<button onclick="downloadCard()">
Kartı İndir
</button>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
